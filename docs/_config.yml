title: Copilot Learning Labs
description: >-
  Self-paced course on GitHub Copilot Pro+ in VS Code — 11 modules,
  9 hands-on labs, prompt library, agent personas, and a capstone project.

theme: just-the-docs

url: https://clipperone.github.io
baseurl: /copilot-learning-labs

permalink: pretty

# --- Visual theme ---
color_scheme: dark

# Logo / favicon — drop files in docs/assets/img/ and uncomment:
# logo: "/assets/img/logo.svg"
# favicon_ico: "/assets/img/favicon.ico"

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

heading_anchors: true

aux_links:
  "View on GitHub":
    - "https://github.com/Clipperone/copilot-learning-labs"
aux_links_new_tab: true

nav_external_links:
  - title: GitHub Repository
    url: https://github.com/Clipperone/copilot-learning-labs
    hide_icon: false

callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: purple

# ─── Plugins (all are on the GitHub Pages whitelist) ─────────────────────────
# jekyll-seo-tag  → injects <title>, <meta description>, OG tags, etc.
# jekyll-sitemap  → auto-generates /sitemap.xml for Google Search Console
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

footer_content: >-
  Licensed under
  <a href="https://github.com/Clipperone/copilot-learning-labs/blob/main/LICENSE">MIT</a>.
  Built with <a href="https://just-the-docs.com">Just the Docs</a>.

back_to_top: true
back_to_top_text: "Back to top"

exclude:
  - Gemfile
  - Gemfile.lock
  - course-design-brief.md
  - architecture.md
  - module-dependency-map.md
  - module-lab-map.md
